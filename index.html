<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; color: #1a1a1a; }
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ---- Menu bar ---- */
  #menubar { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; padding: 5px 8px; background: #24292f; color: #fff; font-size: 12px; }
  #menubar .group { display: inline-flex; align-items: center; gap: 3px; padding: 0 6px; border-right: 1px solid #3a4048; }
  #menubar .group:last-child { border-right: none; }
  #menubar .glabel { font-size: 9px; text-transform: uppercase; letter-spacing: .05em; color: #8b949e; margin-right: 2px; }
  #menubar button { font-size: 12px; padding: 4px 8px; background: #333b44; color: #fff; border: 1px solid #454d57; border-radius: 5px; cursor: pointer; }
  #menubar button:hover { background: #3f4852; border-color: #0969da; }
  #menubar button:disabled { opacity: .4; cursor: default; }
  #menubar select { font-size: 12px; padding: 3px 5px; background: #333b44; color: #fff; border: 1px solid #454d57; border-radius: 5px; }
  #menubar label.chk { display: inline-flex; align-items: center; gap: 4px; cursor: pointer; }
  #savestate { font-size: 11px; color: #8b949e; min-width: 92px; }
  #filename { font-size: 11px; color: #e6edf3; background: #2d333b; border: 1px solid #444c56;
    border-radius: 4px; padding: 2px 8px; max-width: 220px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; cursor: pointer; }
  #filename:hover { border-color: #58a6ff; }

  #main { display: flex; flex: 1 1 auto; min-height: 0; }

  /* ---- Palette ---- */
  #palette { width: 196px; flex: 0 0 196px; background: #f4f5f7; border-right: 1px solid #d0d7de; overflow-y: auto; }
  #palette h3 { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: #57606a; margin: 12px 12px 4px; }
  .palette-item { display: flex; align-items: center; gap: 8px; margin: 4px 8px; padding: 6px 8px; background: #fff; border: 1px solid #d0d7de; border-radius: 6px; cursor: pointer; font-size: 12px; user-select: none; }
  .palette-item:hover { border-color: #0969da; }
  .palette-item svg { flex: 0 0 34px; }

  /* ---- Canvas ---- */
  #canvas-wrap { flex: 1 1 auto; position: relative; overflow: hidden; background: #eef1f4; }
  #paper { position: absolute; inset: 0; cursor: grab; }
  #paper.pan { cursor: grab; }
  #paper.panning { cursor: grabbing; }
  /* hide idle ports; reveal on element hover, on selection, and while connecting */
  #paper .joint-port { opacity: 0; transition: opacity .12s; }
  #paper .joint-element:hover .joint-port { opacity: 1; }
  #paper .joint-element.pnid-sel .joint-port { opacity: 1; }
  #paper .available-magnet { opacity: 1 !important; }
  #zoombar { position: absolute; top: 8px; right: 8px; display: inline-flex; gap: 4px; align-items: center; z-index: 5; background: #fff; border: 1px solid #d0d7de; border-radius: 6px; padding: 3px 4px; font-size: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  #zoombar button { font-size: 12px; padding: 3px 7px; background: #fff; border: 1px solid #d0d7de; border-radius: 5px; cursor: pointer; }
  #zoombar button:hover { border-color: #0969da; }
  #zoomval { min-width: 40px; text-align: center; color: #57606a; }

  /* ---- Properties ---- */
  #props { width: 272px; flex: 0 0 272px; background: #f4f5f7; border-left: 1px solid #d0d7de; overflow-y: auto; padding: 12px; }
  #props h3 { font-size: 13px; margin: 0 0 4px; }
  #props .sub { font-size: 11px; color: #57606a; margin: 0 0 10px; font-weight: 600; }
  #props .empty { font-size: 12px; color: #57606a; }
  #props .derived { font-size: 11px; color: #57606a; background: #eaeef2; border-radius: 5px; padding: 6px 8px; margin-bottom: 10px; }
  #props .derived b { color: #1a1a1a; }
  .field { margin-bottom: 9px; }
  .field label { display: block; font-size: 11px; color: #57606a; margin-bottom: 3px; }
  .field input, .field select, .field textarea { width: 100%; font-size: 12px; padding: 5px 6px; border: 1px solid #d0d7de; border-radius: 5px; background: #fff; }
  .field textarea { resize: vertical; min-height: 44px; }
  .field.row2 { display: flex; gap: 8px; } .field.row2 > div { flex: 1; }

  /* ---- Bottom panel (schedules / issues) ---- */
  #bottom { flex: 0 0 auto; height: 0; overflow: hidden; border-top: 1px solid #d0d7de; background: #fff; display: flex; flex-direction: column; transition: height .12s; }
  #bottom.open { height: 246px; }
  #bottom-tabs { display: flex; align-items: center; gap: 2px; background: #f4f5f7; border-bottom: 1px solid #d0d7de; padding: 4px 6px; }
  #bottom-tabs button { font-size: 12px; padding: 4px 10px; background: transparent; border: 1px solid transparent; border-radius: 5px 5px 0 0; cursor: pointer; color: #57606a; }
  #bottom-tabs button.active { background: #fff; border-color: #d0d7de; border-bottom-color: #fff; color: #1a1a1a; font-weight: 600; margin-bottom: -1px; }
  #bottom-tabs .spacer { flex: 1; }
  #bottom-tabs .count { font-size: 10px; background: #d0d7de; color: #24292f; border-radius: 9px; padding: 0 5px; margin-left: 5px; }
  #bottom-tabs .count.err { background: #cf222e; color: #fff; }
  #bottom-body { flex: 1; overflow: auto; padding: 8px 10px; }
  #bottom-body .barrow { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  #bottom-body h4 { margin: 0; font-size: 12px; color: #24292f; }
  table.sched { border-collapse: collapse; width: 100%; font-size: 11px; }
  table.sched th, table.sched td { border: 1px solid #e1e4e8; padding: 3px 6px; text-align: left; white-space: nowrap; }
  table.sched th { background: #f4f5f7; position: sticky; top: 0; font-weight: 600; color: #24292f; }
  table.sched tr:hover td { background: #f0f6ff; cursor: pointer; }
  table.sched td.wrap { white-space: normal; min-width: 140px; }
  .sev-error { color: #cf222e; font-weight: 600; }
  .sev-warn { color: #9a6700; font-weight: 600; }
  .sev-info { color: #57606a; }
  .minibtn { font-size: 11px; padding: 3px 9px; background: #fff; border: 1px solid #d0d7de; border-radius: 5px; cursor: pointer; }
  .minibtn:hover { border-color: #0969da; }
  .pill { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }

  /* modal */
  #modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: none; align-items: center; justify-content: center; z-index: 50; }
  #modal { background: #fff; border-radius: 8px; padding: 18px 20px; width: 420px; max-width: 92vw; box-shadow: 0 8px 30px rgba(0,0,0,.25); }
  #modal h3 { margin: 0 0 12px; font-size: 15px; }
  #modal .field { margin-bottom: 8px; }
  #modal .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
  #modal button { font-size: 13px; padding: 6px 14px; border-radius: 6px; border: 1px solid #d0d7de; background: #fff; cursor: pointer; }
  #modal button.primary { background: #1f6feb; color: #fff; border-color: #1f6feb; }
</style>

<div id="app">
  <div id="menubar">
    <div class="group">
      <span class="glabel">File</span>
      <button id="m-new" title="New / clear">New</button>
      <button id="m-open" title="Open .json project">Open</button>
      <button id="m-save" title="Save project to file">Save</button>
      <button id="m-ref" title="Load the reference layout">Reference</button>
      <select id="m-template" title="Load a built-in template"><option value="">Templates…</option></select>
      <span id="filename" title="Working file — click to rename">Untitled</span>
      <span id="savestate">—</span>
    </div>
    <div class="group">
      <span class="glabel">Edit</span>
      <button id="m-undo" title="Undo (⌘Z)">Undo</button>
      <button id="m-redo" title="Redo (⌘⇧Z)">Redo</button>
      <button id="m-dup" title="Duplicate (⌘D)">Duplicate</button>
      <button id="m-del" title="Delete (⌫)">Delete</button>
    </div>
    <div class="group">
      <span class="glabel">Export</span>
      <button id="m-svg">SVG</button>
      <button id="m-png">PNG</button>
      <button id="m-pdf">Print / PDF</button>
    </div>
    <div class="group">
      <span class="glabel">Data</span>
      <button id="m-sched">Schedules</button>
      <button id="m-issues">Validate</button>
      <button id="m-title">Title block…</button>
    </div>
    <div class="group">
      <span class="glabel">View</span>
      <select id="m-mode" title="Drawing view mode">
        <option value="engineering">Engineering</option>
        <option value="proposal">Proposal</option>
      </select>
      <label class="chk"><input type="checkbox" id="m-color" checked> Colour by service</label>
      <label class="chk"><input type="checkbox" id="m-route"> Route around equipment</label>
    </div>
  </div>

  <div id="main">
    <div id="palette"></div>
    <div id="canvas-wrap">
      <div id="zoombar">
        <button id="z-out">−</button>
        <span id="zoomval">100%</span>
        <button id="z-in">+</button>
        <button id="z-fit" title="Fit to content">Fit</button>
        <button id="z-100" title="Reset zoom">1:1</button>
      </div>
      <div id="paper"></div>
    </div>
    <div id="props">
      <h3>Properties</h3>
      <div id="props-body"><div class="empty">Select a shape (or a pipe) to edit it.</div></div>
    </div>
  </div>

  <div id="bottom">
    <div id="bottom-tabs">
      <button data-tab="lines">Line list <span class="count" id="c-lines">0</span></button>
      <button data-tab="equip">Equipment <span class="count" id="c-equip">0</span></button>
      <button data-tab="drain">Drain / Waste <span class="count" id="c-drain">0</span></button>
      <button data-tab="issues">Issues <span class="count" id="c-issues">0</span></button>
      <span class="spacer"></span>
      <button data-tab="close" title="Hide panel">✕</button>
    </div>
    <div id="bottom-body"></div>
  </div>
</div>

<datalist id="dn-list">
  <option value="15"><option value="20"><option value="25"><option value="32"><option value="40">
  <option value="50"><option value="65"><option value="80"><option value="100"><option value="125">
  <option value="150"><option value="200"><option value="250"><option value="300">
</datalist>

<div id="modal-bg"><div id="modal"></div></div>
<input type="file" id="fileinput" accept=".json,application/json" style="display:none">

/* ============================================================
   Tag helpers
   ============================================================ */
function tagKey(type) { return type === 'pump' ? 'idTag' : (type === 'instrument' ? 'tag' : 'tag'); }
function elementTag(cell) {
  const t = cell.get('pnidType'); const m = cell.get('pnidMeta') || {};
  if (t === 'pump') return m.idTag || '';
  return m.tag || '';
}
function elementLabelText(cell) {
  const m = cell.get('pnidMeta') || {};
  return elementTag(cell) || m.name || LABELS[cell.get('pnidType')] || '';
}
function assignAutoTag(cell) {
  const t = cell.get('pnidType'); const pfx = PREFIX[t];
  if (!pfx) return;
  if (elementTag(cell)) return;
  let max = 0;
  graph.getElements().forEach(el => {
    if (el === cell) return;
    const tg = elementTag(el);
    const re = new RegExp('^' + pfx + '-(\\d+)$');
    const mm = tg && tg.match(re);
    if (mm) max = Math.max(max, parseInt(mm[1], 10));
  });
  const tag = pfx + '-' + String(max + 1).padStart(2, '0');
  const meta = { ...(cell.get('pnidMeta') || {}) };
  meta[tagKey(t)] = tag;
  cell.set('pnidMeta', meta);
  syncLabel(cell);
}

const ResizeControl = joint.elementTools.Control.extend({
  getPosition: function (view) { const s = view.model.size(); return { x: s.width, y: s.height }; },
  setPosition: function (view, coords) {
    const m = view.model;
    const nat = FIXED_NATIVE[m.get('pnidType')];
    if (nat) {
      // fixed-geometry icons scale uniformly (0.5x .. 5x)
      const sc = Math.min(5, Math.max(0.5, Math.max(coords.x / nat[0], coords.y / nat[1])));
      m.resize(Math.round(nat[0] * sc), Math.round(nat[1] * sc));
    } else {
      const w = Math.max(24, Math.round(coords.x / 10) * 10);
      const h = Math.max(24, Math.round(coords.y / 10) * 10);
      m.resize(w, h);
    }
  }
});
const FIXED_NATIVE = { pump: [52, 52], valve: [40, 26], manualValve: [40, 26], checkValve: [40, 26], flowMeter: [44, 28], instrument: [28, 44], compressor: [72, 64], blower: [66, 58], dosingPump: [46, 42], chemTank: [66, 92], panel: [72, 58], offpage: [108, 38], junction: [18, 18] };
const RESIZABLE = { tank: 1, sump: 1, vessel: 1, cartridge: 1, membraneUF: 1, membraneRO: 1, drainageHeader: 1, pump: 1, valve: 1, manualValve: 1, checkValve: 1, flowMeter: 1, instrument: 1, compressor: 1, blower: 1, dosingPump: 1, chemTank: 1, panel: 1, offpage: 1, junction: 1 };
let toolsHost = null;
let selView = null;
function selectCell(cell) {
  if (toolsHost) { toolsHost.removeTools(); toolsHost = null; }
  if (selView) { selView.el.classList.remove('pnid-sel'); selView = null; }
  selected = cell;
  if (cell && cell.isElement && cell.isElement()) {
    const view = cell.findView(paper);
    if (view) {
      view.el.classList.add('pnid-sel'); selView = view;
      if (RESIZABLE[cell.get('pnidType')]) {
        view.addTools(new dia.ToolsView({ tools: [
          new joint.elementTools.Boundary({ padding: 8, useModelGeometry: true, attributes: { fill: 'none', stroke: '#0969da', 'stroke-width': 1, 'stroke-dasharray': '4,3', 'pointer-events': 'none' } }),
          new ResizeControl({ handleAttributes: { fill: '#0969da', stroke: '#ffffff', 'stroke-width': 2, r: 9, cursor: 'nwse-resize' } })
        ] }));
        toolsHost = view;
      }
    }
  } else if (cell && cell.isLink && cell.isLink()) {
    const view = cell.findView(paper);
    if (view) {
      view.addTools(new dia.ToolsView({ tools: [
        new joint.linkTools.Vertices(),
        new joint.linkTools.Segments(),
        new joint.linkTools.TargetArrowhead(),
        new joint.linkTools.Remove({ distance: -30 })

      toolsHost = view;
    }
  }
  refreshProps();
}

function refreshSump(el) {

    const m = el.get('pnidMeta') || {}; const t = el.get('pnidType');

      spec: m.flowRate || m.size || m.media || '', power: m.power || '', inDN: m.dnIn || '', outDN: m.dnOut || m.dn || '',

function collectDrains() {

    const toOff = e.t && e.t.get('pnidType') === 'offpage';
    if ((svc && svc.waste) || toOff) {

function velocity(flow, dn) {

  return (q / 3600) / a; // m/s
}
function collectIssues() {
  const out = [];
  const tags = {};
  graph.getElements().forEach(el => {
    if (!EQUIP_TYPES.includes(el.get('pnidType'))) return;
    const tg = elementTag(el);
    if (tg) { tags[tg] = (tags[tg] || 0) + 1; }
  });
  Object.keys(tags).forEach(tg => { if (tags[tg] > 1) out.push({ sev: 'error', ref: tg, msg: `Duplicate tag used ${tags[tg]}×` }); });
  graph.getElements().forEach(el => {
    const t = el.get('pnidType'); const m = el.get('pnidMeta') || {};
    if (t === 'pump' && (!m.flowRate || !m.head)) out.push({ id: el.id, sev: 'warn', ref: elementTag(el) || 'Pump', msg: 'Pump missing flow and/or head' });
  });
  graph.getLinks().forEach(l => {
    const m = l.get('pnidMeta') || {}; const e = linkEnds(l); const ref = m.lineNo || 'line';
    if (!e.s || !e.t) out.push({ id: l.id, sev: 'error', ref, msg: `Line not connected both ends (${e.from} → ${e.to})` });
    if (!m.dn) out.push({ id: l.id, sev: 'warn', ref, msg: 'Line has no DN size' });
    if (!m.service) out.push({ id: l.id, sev: 'warn', ref, msg: 'Line has no service' });
    if (!m.material) out.push({ id: l.id, sev: 'info', ref, msg: 'Line has no material' });
    const svc = SERVICE_MAP[m.service];
    if (svc && svc.waste && (!e.t)) out.push({ id: l.id, sev: 'error', ref, msg: 'Waste line has no destination' });
    const v = velocity(m.flow, m.dn);
    if (v && v > 2.5) out.push({ id: l.id, sev: 'warn', ref, msg: `High velocity ${v.toFixed(1)} m/s (DN${m.dn} @ ${m.flow} m³/h)` });
  });
  return out;
}

/* ============================================================
   Zoom / pan
   ============================================================ */
const View = { s: 1, tx: 0, ty: 0 };
const wrapEl = document.getElementById('canvas-wrap');
const paperEl = document.getElementById('paper');
function applyTransform() { paper.scale(View.s); paper.translate(View.tx, View.ty); updateZoomLabel(); }
function updateZoomLabel() { document.getElementById('zoomval').textContent = Math.round(View.s * 100) + '%'; }
function setZoom(s, cx, cy) {
  s = Math.min(4, Math.max(0.1, s));
  const rect = wrapEl.getBoundingClientRect();
  if (cx == null) { cx = rect.width / 2; cy = rect.height / 2; }
  const mx = (cx - View.tx) / View.s, my = (cy - View.ty) / View.s;
  View.s = s; View.tx = cx - mx * s; View.ty = cy - my * s; applyTransform();
}
function fitContent() {
  const b = graph.getBBox();
  if (!b) { View.s = 1; View.tx = 20; View.ty = 20; applyTransform(); return; }
  const rect = wrapEl.getBoundingClientRect(); const m = 40;
  const s = Math.min((rect.width - m * 2) / b.width, (rect.height - m * 2) / b.height, 2);
  View.s = Math.max(0.1, s);
  View.tx = (rect.width - View.s * b.width) / 2 - View.s * b.x;
  View.ty = (rect.height - View.s * b.height) / 2 - View.s * b.y;
  applyTransform();
}
function centerOn(cell) {

  const rect = wrapEl.getBoundingClientRect();
  View.tx = rect.width / 2 - View.s * (bb.x + bb.width / 2);
  View.ty = rect.height / 2 - View.s * (bb.y + bb.height / 2);

}
document.getElementById('z-in').onclick = () => setZoom(View.s * 1.2);
document.getElementById('z-out').onclick = () => setZoom(View.s / 1.2);

let spaceDown = false, panning = null;
document.addEventListener('keydown', e => { if (e.code === 'Space' && document.activeElement === document.body) { spaceDown = true; paperEl.classList.add('pan'); e.preventDefault(); } });

function withIdentity(fn) {
  const cur = { ...View };
  View.s = 1; View.tx = 0; View.ty = 0; paper.scale(1); paper.translate(0, 0);
  try { return fn(); } finally { View.s = cur.s; View.tx = cur.tx; View.ty = cur.ty; applyTransform(); }
}
function buildExportSVG() {
  selectCell(null);
  const b = graph.getBBox() || new gGeom.Rect(0, 0, 400, 300);
  const m = 46, tbW = 380, tbH = 118, legH = 18 + 7 * 16;
  const contentW = Math.max(b.width, 620);
  const W = contentW + m * 2;
  const H = b.height + m * 2 + tbH + 24;
  return withIdentity(() => {
    const src = paper.svg.cloneNode(true);

    const out = svgEl('svg', { xmlns: SVGNS, 'xmlns:xlink': 'http://www.w3.org/1999/xlink', width: W, height: H, viewBox: `0 0 ${W} ${H}` });
    out.appendChild(svgEl('rect', { x: 0, y: 0, width: W, height: H, fill: '#ffffff' }));
    const defs = src.querySelector('defs'); if (defs) out.appendChild(defs.cloneNode(true));
    // content group translated so bbox sits at margin
    const inner = svgEl('g', { transform: `translate(${m - b.x}, ${m - b.y})` });
    src.querySelectorAll('.joint-layers, .joint-cells-layer').forEach(() => {});

    out.appendChild(legendGroup(m, H - legH - 16));

  const svg = buildExportSVG();
  const wm = svg.match(/width="(\d+(?:\.\d+)?)"/), hm = svg.match(/height="(\d+(?:\.\d+)?)"/);
  const W = wm ? parseFloat(wm[1]) : 1600, H = hm ? parseFloat(hm[1]) : 1000;
  const scale = 2;

  const url = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));

    const ctx = c.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, c.width, c.height);

/* Lean format: store type + geometry-independent data only, so the visual geometry is
   regenerated from the current shape definitions on load (symbol edits propagate to old files). */
function serialize() {
  const cells = [];
  graph.getElements().forEach(el => cells.push({ k: 'e', type: el.get('pnidType'), id: el.id,
    x: el.position().x, y: el.position().y, w: el.size().width, h: el.size().height,
    angle: el.angle ? el.angle() : 0, meta: el.get('pnidMeta') }));
  graph.getLinks().forEach(l => cells.push({ k: 'l', id: l.id, source: l.get('source'), target: l.get('target'),
    vertices: l.vertices(), meta: l.get('pnidMeta') }));

function toLeanCells(doc) {
  if (doc.cells) return doc.cells;
  if (doc.graph && doc.graph.cells) return doc.graph.cells.map(c =>
    (c.type === 'standard.Link' || (c.source && c.target))
      ? { k: 'l', id: c.id, source: c.source, target: c.target, vertices: c.vertices || [], meta: c.pnidMeta }
      : { k: 'e', type: c.pnidType, id: c.id, x: (c.position || {}).x, y: (c.position || {}).y,
          w: (c.size || {}).width, h: (c.size || {}).height, angle: c.angle || 0, meta: c.pnidMeta }
  ).filter(c => c.k === 'l' || c.type);
  return [];
}
function applyPumpDirection(el) {
  const rl = ((el.get('pnidMeta') || {}).dir) === 'rl';
  el.attr('impeller/points', rl ? '33,16 15,26 33,36' : '19,16 37,26 19,36');
  el.prop('ports/groups/in/position', rl ? 'right' : 'left');
  el.prop('ports/groups/out/position', rl ? 'left' : 'right');
  el.prop('ports/groups/in/label/position', { name: rl ? 'right' : 'left', args: { x: rl ? 5 : -5 } });
  el.prop('ports/groups/out/label/position', { name: rl ? 'left' : 'right', args: { x: rl ? -5 : 5 } });
}

  const t = el.get('pnidType'); const m = el.get('pnidMeta') || {};
  const fn = SIZE_REFRESH[t]; if (fn) fn(el);

function applyDoc(doc) {
  history.applying = true;
  PROJECT = Object.assign({ name: '', client: '', drawing: 'PFD-001', rev: 'A', date: '', drawnBy: '', checkedBy: '', status: 'For Proposal' }, doc.project || {});
  viewMode = doc.viewMode || 'engineering';

/* ============================================================
   Undo / redo (snapshot history)
   ============================================================ */
const history = { stack: [], i: -1, applying: false, t: null };
function snapshot() {
  if (history.applying) return;
  clearTimeout(history.t);
  history.t = setTimeout(() => {
    const json = JSON.stringify(graph.toJSON());
    if (history.stack[history.i] === json) return;
    history.stack = history.stack.slice(0, history.i + 1);
    history.stack.push(json);
    if (history.stack.length > 60) history.stack.shift();
    history.i = history.stack.length - 1;
    updateUndoButtons(); autosave();
  }, 350);
}
function resetHistory() { history.stack = [JSON.stringify(graph.toJSON())]; history.i = 0; updateUndoButtons(); }
function restoreSnap(json) {
  history.applying = true;
  graph.fromJSON(JSON.parse(json));
  history.applying = false;
  restyleAllLinks(); renderPageFrame(); selectCell(null); scheduleRefresh(); updateUndoButtons();
}
function undo() { if (history.i > 0) { history.i--; restoreSnap(history.stack[history.i]); } }
function redo() { if (history.i < history.stack.length - 1) { history.i++; restoreSnap(history.stack[history.i]); } }
function updateUndoButtons() {
  document.getElementById('m-undo').disabled = history.i <= 0;
  document.getElementById('m-redo').disabled = history.i >= history.stack.length - 1;
}
graph.on('add remove change', () => { if (!history.applying) { snapshot(); scheduleRefresh(); } });

  const tpls = window.PNID_TEMPLATES || {};
  const names = Object.keys(tpls);
  if (!names.length) { sel.style.display = 'none'; return; }
  names.forEach(name => {
    const o = document.createElement('option'); o.value = name; o.textContent = name; sel.appendChild(o);
  });
  sel.onchange = () => {
    const name = sel.value; sel.value = '';
    if (!name || !tpls[name]) return;
    if (!confirm('Load template "' + name + '"? This replaces the current drawing.')) return;
    applyDoc(JSON.parse(JSON.stringify(tpls[name])));
    setFileName(name); resetHistory(); autosave();
  };
})();

document.getElementById('m-redo').onclick = redo;
document.getElementById('m-dup').onclick = duplicateSel;

document.addEventListener('keydown', e => {
  const inField = /^(INPUT|SELECT|TEXTAREA)$/.test(document.activeElement.tagName);
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  else if ((e.metaKey || e.ctrlKey) && (e.key.toLowerCase() === 'y' || (e.key.toLowerCase() === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
  else if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 's') { e.preventDefault(); saveFile(); }
  else if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'd') { e.preventDefault(); duplicateSel(); }
  else if ((e.key === 'Delete' || e.key === 'Backspace') && selected && !inField) { e.preventDefault(); deleteSel(); }
});

  const mb = document.getElementById('modal-bg'), md = document.getElementById('modal');
  const f = (id, label, val) => `<div class="field"><label>${label}</label><input id="tb-${id}" value="${esc(val)}"></div>`;
  md.innerHTML = `<h3>Title block</h3>
    ${f('name', 'Project', PROJECT.name)}
    ${f('client', 'Client', PROJECT.client)}
    <div class="field" style="display:flex;gap:8px">
      <div style="flex:2">${f('drawing', 'Drawing no.', PROJECT.drawing).replace(/^<div class="field">|<\/div>$/g, '')}</div>
      <div style="flex:1">${f('rev', 'Rev', PROJECT.rev).replace(/^<div class="field">|<\/div>$/g, '')}</div>
    </div>
    <div class="field" style="display:flex;gap:8px">
      <div style="flex:1">${f('date', 'Date', PROJECT.date).replace(/^<div class="field">|<\/div>$/g, '')}</div>
      <div style="flex:1">${f('drawnBy', 'Drawn by', PROJECT.drawnBy).replace(/^<div class="field">|<\/div>$/g, '')}</div>
      <div style="flex:1">${f('checkedBy', 'Checked', PROJECT.checkedBy).replace(/^<div class="field">|<\/div>$/g, '')}</div>
    </div>
    <div class="field"><label>Status</label><select id="tb-status">${['For Proposal', 'Preliminary', 'For Review', 'For Construction', 'As Built'].map(o => `<option${o === PROJECT.status ? ' selected' : ''}>${o}</option>`).join('')}</select></div>
    <div class="actions"><button id="tb-cancel">Cancel</button><button class="primary" id="tb-ok">Apply</button></div>`;
  mb.style.display = 'flex';
  md.querySelector('#tb-cancel').onclick = () => mb.style.display = 'none';
  md.querySelector('#tb-ok').onclick = () => {
    ['name', 'client', 'drawing', 'rev', 'date', 'drawnBy', 'checkedBy'].forEach(k => PROJECT[k] = md.querySelector('#tb-' + k).value);
    PROJECT.status = md.querySelector('#tb-status').value;
    mb.style.display = 'none'; renderPageFrame(); autosave();
  };
}
document.getElementById('modal-bg').addEventListener('click', e => { if (e.target.id === 'modal-bg') e.currentTarget.style.display = 'none'; });

/* ============================================================
   Boot
   ============================================================ */
function boot() {
  let restored = false;
  try {
    const raw = localStorage.getItem(AUTOSAVE_KEY);
    if (raw) { applyDoc(JSON.parse(raw)); restored = true; }
  } catch (e) {}
  if (!restored) { buildLayout(); renderPageFrame(); fitContent(); }
  let savedName = null; try { savedName = localStorage.getItem(FILENAME_KEY); } catch (e) {}
  setFileName(restored ? savedName : 'Untitled');
  resetHistory(); updateCounts(); updateZoomLabel();
  document.getElementById('savestate').textContent = restored ? 'Restored ✓' : 'Autosave on';
}
boot();
